<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>旗当番表ツール</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg: #f5f5f7; --card: #ffffff; --accent: #0071e3; --text: #1d1d1f;
            --text-s: #86868b; --border: #d2d2d7; --red: #ff3b30; --blue: #007aff;
            --highlight: #fff9c4; --highlight-border: #ffcc00;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .wrapper { width: 100%; padding: 8px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; }
        .panel { background: var(--card); border-radius: 14px; padding: 12px; width: 100%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); box-sizing: border-box; }
        h1 { font-size: 15px; margin: 0 0 10px; text-align: center; font-weight: 600; }
        
        label { font-size: 10px; font-weight: 600; color: var(--text-s); margin-bottom: 2px; display: block; letter-spacing: 0.05em; }
        
        textarea { 
            width: 100%; 
            height: 80px; /* ★高さをさらに詰め、カレンダーを上に引っ張り上げました */
            border: 1px solid var(--border); 
            border-radius: 8px; 
            padding: 8px 8px 15px 8px; /* 下部に逃げの余白を確保 */
            margin-bottom: 8px; 
            font-size: 15px; 
            box-sizing: border-box; 
            background: #fff;
            line-height: 1.4;
            resize: none;
            -webkit-appearance: none;
            outline: none;
        }
        
        .calendar-container { border: 1px solid var(--border); border-radius: 10px; padding: 6px; margin-bottom: 10px; background: #fff; }
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .cal-month-label { font-size: 13px; font-weight: bold; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; }
        .cal-head-cell { font-size: 9px; text-align: center; color: var(--text-s); padding-bottom: 1px; }
        .cal-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; border-radius: 50%; min-height: 36px; }
        .selected { background: var(--text) !important; color: #fff !important; font-weight: bold; }
        .sun { color: var(--red); } .sat { color: var(--blue); }

        .btn-group { margin-top: 5px; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: bold; margin-bottom: 8px; font-size: 15px; cursor: pointer; }
        .btn-main { background: var(--accent); color: white; }
        .btn-sub { background: white; color: var(--accent); border: 1px solid var(--accent); }

        #print-area { background: #fff; width: 100%; max-width: 500px; padding: 25px 15px; margin: 15px auto; border-radius: 8px; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; table-layout: fixed; }
        th { border-bottom: 1.5px solid #000; padding: 10px 0; font-weight: bold; }
        td { border-bottom: 1px solid #f0f0f5; padding: 12px 0; text-align: center; }

        .name-tag { display: inline-block; width: 90%; padding: 8px 0; border-radius: 6px; cursor: pointer; }
        .name-tag.active { background: var(--highlight) !important; color: #000 !important; font-weight: bold; outline: 2px solid var(--highlight-border); }

        #outBikou { 
            margin-top: 20px; 
            padding-top: 15px; 
            border-top: 1px solid #eee; 
            font-size: 13px; 
            color: var(--red) !important; 
            white-space: pre-wrap; 
            line-height: 1.6;
            display: none;
        }
    </style>
