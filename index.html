<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>旗当番表ツール</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg: #f5f5f7; --card: #ffffff; --accent: #0071e3; --text: #1d1d1f;
            --text-s: #86868b; --border: #d2d2d7; --red: #ff3b30; --blue: #007aff;
            --highlight: #fff9c4;
        }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        .wrapper { width: 100%; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .panel { background: var(--card); border-radius: 12px; padding: 15px; width: 100%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { font-size: 16px; margin: 0 0 12px; text-align: center; }
        
        label { font-size: 11px; font-weight: bold; color: var(--text-s); margin-bottom: 4px; display: block; }
        textarea { 
            width: 100%; 
            height: 90px; 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            padding: 10px; 
            margin-bottom: 12px; 
            font-size: 16px; 
            line-height: 1.4;
            resize: none;
            display: block;
        }
        
        .calendar-container { border: 1px solid var(--border); border-radius: 10px; padding: 10px; margin-bottom: 12px; background: #fff; }
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .cal-month-label { font-size: 14px; font-weight: bold; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
        .cal-head-cell { font-size: 10px; text-align: center; color: var(--text-s); padding-bottom: 4px; }
        .cal-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; border-radius: 50%; }
        .selected { background: var(--text) !important; color: #fff !important; font-weight: bold; }
        .sun { color: var(--red); } .sat { color: var(--blue); }

        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; margin-bottom: 10px; font-size: 16px; cursor: pointer; }
        .btn-main { background: var(--accent); color: white; }
        .btn-sub { background: white; color: var(--accent); border: 1px solid var(--accent); }

        #print-area { background: #fff; width: 100%; max-width: 500px; padding: 30px 15px; margin: 20px auto; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; table-layout: fixed; }
        th { border-bottom: 1.5px solid #000; padding: 10px 0; }
        td { border-bottom: 1px solid #f0f0f5; padding: 12px 0; text-align: center; }
        .name-tag { display: inline-block; width: 90%; padding: 8px 0; border-radius: 6px; cursor: pointer; }
        .name-tag.active { background: var(--highlight); font-weight: bold; outline: 2px solid #ffcc00; }
        #outBikou { margin-top: 25px; padding-top: 15px; border-top: 1px solid #eee; font-size: 13px; color: var(--red) !important; white-space: pre-wrap; display: none; }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="panel">
        <h1>旗当番表作成</h1>
        <label>A班 メンバー</label>
        <textarea id="groupA"></textarea>
        <label>B班 メンバー</label>
        <textarea id="groupB"></textarea>
        <label>当番の日を選択</label>
        <div class="calendar-container">
            <div class="cal-header">
                <span id="calMonth" class="cal-month-label"></span>
                <div>
                    <button type="button" onclick="changeMonth(-1)" style="padding:5px 10px;">‹</button>
                    <button type="button" onclick="changeMonth(1)" style="padding:5px 10px;">›</button>
                </div>
            </div>
            <div id="calGrid" class="cal-grid"></div>
        </div>
        <label>備考</label>
        <textarea id="bikouInput"></textarea>
        <button class="btn btn-main" onclick="generateTable()">表を生成する</button>
        <button class="btn btn-sub" onclick="saveAsImage()">画像として保存</button>
    </div>
    
    <div id="print-area">
        <div id="outTitle" style="font-weight:bold; text-align:center; margin-bottom:15px; font-size:18px;"></div>
        <table><tbody id="tableBody"></tbody></table>
        <div id="outBikou"></div>
    </div>
</div>

<script>
    var selectedDates = {};
    var currentViewDate
