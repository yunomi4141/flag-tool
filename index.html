<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>旗当番表ツール</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg: #f5f5f7; --card: #ffffff; --accent: #0071e3; --text: #1d1d1f;
            --text-s: #86868b; --border: #d2d2d7; --red: #ff3b30; --blue: #007aff;
            --highlight: #fff9c4; --highlight-border: #ffcc00;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .wrapper { width: 100%; padding: 8px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; }
        .panel { background: var(--card); border-radius: 14px; padding: 12px; width: 100%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); box-sizing: border-box; }
        h1 { font-size: 15px; margin: 0 0 10px; text-align: center; font-weight: 600; }
        
        label { font-size: 10px; font-weight: 600; color: var(--text-s); margin-bottom: 2px; display: block; letter-spacing: 0.05em; }
        
        textarea { 
            width: 100%; 
            height: 80px; /* ★高さをさらに詰め、カレンダーを上に引っ張り上げました */
            border: 1px solid var(--border); 
            border-radius: 8px; 
            padding: 8px 8px 15px 8px; /* 下部に逃げの余白を確保 */
            margin-bottom: 8px; 
            font-size: 15px; 
            box-sizing: border-box; 
            background: #fff;
            line-height: 1.4;
            resize: none;
            -webkit-appearance: none;
            outline: none;
        }
        
        .calendar-container { border: 1px solid var(--border); border-radius: 10px; padding: 6px; margin-bottom: 10px; background: #fff; }
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .cal-month-label { font-size: 13px; font-weight: bold; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; }
        .cal-head-cell { font-size: 9px; text-align: center; color: var(--text-s); padding-bottom: 1px; }
        .cal-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; border-radius: 50%; min-height: 36px; }
        .selected { background: var(--text) !important; color: #fff !important; font-weight: bold; }
        .sun { color: var(--red); } .sat { color: var(--blue); }

        .btn-group { margin-top: 5px; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: bold; margin-bottom: 8px; font-size: 15px; cursor: pointer; }
        .btn-main { background: var(--accent); color: white; }
        .btn-sub { background: white; color: var(--accent); border: 1px solid var(--accent); }

        #print-area { background: #fff; width: 100%; max-width: 500px; padding: 25px 15px; margin: 15px auto; border-radius: 8px; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; table-layout: fixed; }
        th { border-bottom: 1.5px solid #000; padding: 10px 0; font-weight: bold; }
        td { border-bottom: 1px solid #f0f0f5; padding: 12px 0; text-align: center; }

        .name-tag { display: inline-block; width: 90%; padding: 8px 0; border-radius: 6px; cursor: pointer; }
        .name-tag.active { background: var(--highlight) !important; color: #000 !important; font-weight: bold; outline: 2px solid var(--highlight-border); }

        #outBikou { 
            margin-top: 20px; 
            padding-top: 15px; 
            border-top: 1px solid #eee; 
            font-size: 13px; 
            color: var(--red) !important; 
            white-space: pre-wrap; 
            line-height: 1.6;
            display: none;
        }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="panel">
        <h1>旗当番表作成</h1>
        <label>A班 メンバー</label>
        <textarea id="groupA" placeholder="名前を改行で入力"></textarea>
        
        <label>B班 メンバー</label>
        <textarea id="groupB" placeholder="名前を改行で入力"></textarea>
        
        <label>当番の日を選択</label>
        <div class="calendar-container">
            <div class="cal-header">
                <span id="calMonth" class="cal-month-label"></span>
                <div style="display:flex; gap:6px;">
                    <button type="button" onclick="changeMonth(-1)" style="padding:4px 8px; border-radius:6px; border:1px solid var(--border); background:#fff; font-size:12px;">‹</button>
                    <button type="button" onclick="changeMonth(1)" style="padding:4px 8px; border-radius:6px; border:1px solid var(--border); background:#fff; font-size:12px;">›</button>
                </div>
            </div>
            <div id="calGrid" class="cal-grid"></div>
        </div>
        
        <label>備考</label>
        <textarea id="bikouInput" placeholder="備考を入力"></textarea>
        
        <div class="btn-group">
            <button class="btn btn-main" onclick="generateTable()">表を生成する</button>
            <button class="btn btn-sub" onclick="saveAsImage()">画像として保存</button>
        </div>
    </div>
    
    <div id="print-area">
        <div id="outTitle" style="font-weight:bold; text-align:center; margin-bottom:15px; font-size:18px;"></div>
        <table>
            <tbody id="tableBody"></tbody>
        </table>
        <div id="outBikou"></div>
    </div>
</div>

<script>
    var selectedDates = {};
    var currentViewDate = new Date();
    var selectedNameEl = null;

    window.onload = function() {
        ['groupA', 'groupB', 'bikouInput'].forEach(function(k) {
            var saved = localStorage.getItem(k);
            if(saved) document.getElementById(k).value = saved;
        });
        renderCalendar();
    };

    function renderCalendar() {
        var grid = document.getElementById('calGrid');
        var monthLabel = document.getElementById('calMonth');
        grid.innerHTML = "";
        var year = currentViewDate.getFullYear();
        var month = currentViewDate.getMonth();
        monthLabel.innerHTML = year + "年 " + (month + 1) + "月";
        var days = ["日", "月", "火", "水", "木", "金", "土"];
        for(var i=0; i<7; i++) {
            var h = document.createElement('div');
            h.className = 'cal-head-cell' + (i==0?' sun':(i==6?' sat':''));
            h.innerHTML = days[i];
            grid.appendChild(h);
        }
        var firstDay = new Date(year, month, 1).getDay();
        var lastDate = new Date(year, month + 1, 0).getDate();
        for(var j=0; j<firstDay; j++) grid.appendChild(document.createElement('div'));
        for(var d=1; d<=lastDate; d++) {
            (function(dateNum) {
                var cell = document.createElement('div');
                var dObj = new Date(year, month, dateNum);
                var dow = dObj.getDay();
                var dateKey = year + "-" + (month+1) + "-" + dateNum;
                cell.className = 'cal-cell' + (dow==0?' sun':(dow==6?' sat':''));
                if(selectedDates[dateKey]) cell.className += ' selected';
                cell.innerHTML = dateNum;
                cell.onclick = function() {
                    if(selectedDates[dateKey]) { delete selectedDates[dateKey]; this.classList.remove('selected'); }
                    else { selectedDates[dateKey] = true; this.classList.add('selected'); }
                };
                grid.appendChild(cell);
            })(d);
        }
    }

    function changeMonth(n) { currentViewDate.setMonth(currentViewDate.getMonth() + n); renderCalendar(); }

    function generateTable() {
        var memA = document.getElementById('groupA').value.split('\n').filter(function(v){return v!==""});
        var memB = document.getElementById('groupB').value.split('\n').filter(function(v){return v!==""});
        var bText = document.getElementById('bikouInput').value;
        var dates = Object.keys(selectedDates).sort(function(a,b){
            return new Date(a.replace(/-/g,'/')) - new Date(b.replace(/-/g,'/'));
        });
        
        localStorage.setItem('groupA', document.getElementById('groupA').value);
        localStorage.setItem('groupB', document.getElementById('groupB').value);
        localStorage.setItem('bikouInput', bText);

        if(!dates.length) { alert("日付を選んでください"); return; }

        var tbody = document.getElementById('tableBody');
        tbody.innerHTML = "<tr><th>日付</th><th>当番1</th><th>当番2</th></tr>";
        
        for(var i=0; i<dates.length; i++) {
            var d = new Date(dates[i].replace(/-/g,'/'));
            var row = tbody.insertRow();
            var dayNames = ["日","月","火","水","木","金","土"];
            var c1 = row.insertCell(0);
            c1.innerHTML = (d.getMonth()+1)+"/"+d.getDate()+"("+dayNames[d.getDay()]+")";
            if(d.getDay()==0) c1.style.color = "var(--red)";
            if(d.getDay()==6) c1.style.color = "var(--blue)";
            
            row.insertCell(1).innerHTML = '<span class="name-tag" onclick="handleSwap(this)">' + (memA[i%memA.length] || "-") + '</span>';
            row.insertCell(2).innerHTML = '<span class="name-tag" onclick="handleSwap(this)">' + (memB[i%memB.length] || "-") + '</span>';
        }
        document.getElementById('outTitle').innerHTML = (new Date(dates[0].replace(/-/g,'/')).getMonth()+1) + "月 旗当番表";
        
        var outBikou = document.getElementById('outBikou');
        if(bText.trim()) {
            outBikou.style.display = "block";
            outBikou.style.setProperty('color', 'var(--red)', 'important');
            outBikou.innerHTML = "<strong style='color:var(--red) !important;'>【備考】</strong><br>" + bText;
        } else {
            outBikou.style.display = "none";
        }
        
        document.getElementById('print-area').scrollIntoView({ behavior: 'smooth' });
    }

    function handleSwap(el) {
        if (!selectedNameEl) { selectedNameEl = el; el.classList.add('active'); }
        else if (selectedNameEl === el) { el.classList.remove('active'); selectedNameEl = null; }
        else {
            var temp = el.innerHTML;
            el.innerHTML = selectedNameEl.innerHTML;
            selectedNameEl.innerHTML = temp;
            selectedNameEl.classList.remove('active');
            selectedNameEl = null;
        }
    }

    function saveAsImage() {
        var element = document.getElementById('print-area');
        html2canvas(element, {scale:2, backgroundColor:'#ffffff'}).then(function(canvas) {
            var link = document.createElement('a');
            link.href = canvas.toDataURL('image/png');
            link.download = '旗当番表.png';
            link.click();
        });
    }
</script>
</body>
</html>
