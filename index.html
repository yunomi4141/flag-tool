<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>旗当番表ツール</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg: #f5f5f7; --card: #ffffff; --accent: #0071e3; --text: #1d1d1f;
            --text-s: #86868b; --border: #d2d2d7; --red: #ff3b30; --blue: #007aff;
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        .wrapper { width: 100%; padding: 5px; box-sizing: border-box; }
        .panel { background: var(--card); border-radius: 12px; padding: 12px; width: 100%; max-width: 450px; margin: 0 auto 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { font-size: 16px; margin: 0 0 10px; text-align: center; }
        
        /* ラベルと入力欄をタイトに */
        label { font-size: 10px; font-weight: bold; color: var(--text-s); margin-bottom: 2px; display: block; }
        textarea { 
            width: 100%; 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            padding: 8px; 
            margin-bottom: 8px; 
            font-size: 15px; 
            box-sizing: border-box; 
            background: #fff;
            line-height: 1.2;
            resize: none; /* 手動リサイズ不可 */
        }
        
        /* カレンダーをコンパクトに */
        .calendar-container { border: 1px solid var(--border); border-radius: 10px; padding: 8px; margin-bottom: 10px; background: #fff; }
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .cal-month-label { font-size: 14px; font-weight: bold; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; }
        .cal-head-cell { font-size: 9px; text-align: center; color: var(--text-s); padding-bottom: 2px; }
        .cal-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 15px; cursor: pointer; border-radius: 50%; min-height: 35px; }
        .selected { background: #1d1d1f !important; color: #fff !important; font-weight: bold; }
        .sun { color: var(--red); } .sat { color: var(--blue); }

        .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; margin-bottom: 8px; font-size: 15px; cursor: pointer; }
        .btn-main { background: var(--accent); color: white; }
        .btn-sub { background: white; color: var(--accent); border: 1px solid var(--accent); }

        /* 保存用エリア */
        #print-area { background: #fff; width: 100%; max-width: 500px; padding: 20px 10px; margin: 0 auto; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; table-layout: fixed; }
        th { border-bottom: 1.5px solid #000; padding: 8px 0; }
        td { border-bottom: 1px solid #f2f2f7; padding: 10px 0; text-align: center; }

        .name-tag { display: inline-block; width: 90%; padding: 6px 0; border-radius: 6px; cursor: pointer; user-select: none; }
        .name-tag.active { background: #ffcc00 !important; color: #000 !important; font-weight: bold; }

        #outBikou { 
            margin-top: 20px; 
            padding-top: 10px; 
            border-top: 1px solid #eee; 
            font-size: 13px; 
            color: #ff3b30 !important; 
            white-space: pre-wrap; 
            line-height: 1.5;
            display: none;
        }

        @media screen and (min-width: 1024px) {
            .wrapper { display: flex; justify-content: center; align-items: flex-start; gap: 20px; padding: 20px; }
        }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="panel">
        <h1>旗当番表作成</h1>
        <label>A班 メンバー（5行）</label>
        <textarea id="groupA" rows="5" placeholder="名前を改行で入力"></textarea>
        
        <label>B班 メンバー（5行）</label>
        <textarea id="groupB" rows="5" placeholder="名前を改行で入力"></textarea>
        
        <label>当番の日を選択</label>
        <div class="calendar-container">
            <div class="cal-header">
